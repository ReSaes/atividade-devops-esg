name: CI/CD Pipeline - Esgincdivcorp

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-pack:
    name: Build & Dockerize
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Ajustar permissão do Maven Wrapper
      run: chmod +x mvnw

    - name: Compilar Projeto (Esgincdivcorp)
      run: ./mvnw -B package -DskipTests --file pom.xml

    - name: Gerar Imagem Docker
      run: |
        docker build -t esgincdivcorp-app:latest .
        echo "Imagem Docker gerada com sucesso para o sistema de diversidade."

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-pack
    runs-on: ubuntu-latest
    steps:
    - name: Simulação de Deploy - Staging
      run: |
        echo "Conectando ao servidor de Staging do Esgincdivcorp..."
        echo "Validando regras de triagem de currículos em ambiente de teste."
        echo "Status: Staging online em http://staging.esgincdivcorp.com"

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
    - name: Simulação de Deploy - Produção
      run: |
        echo "Iniciando deploy em Produção (Esgincdivcorp)..."
        echo "Publicando aplicação final de seleção inclusiva."
        echo "Status: Produção online em http://www.esgincdivcorp.com.br"